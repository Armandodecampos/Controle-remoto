<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebRTC Streamer & Remote Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            touch-action: none; /* Crucial para mobile: impede scroll ao controlar */
            position: relative;
        }
        #screenVideo {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }
        /* Feedback visual do clique */
        .click-ripple {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(59, 130, 246, 0.5);
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: ripple 0.4s ease-out;
        }
        @keyframes ripple {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center p-4">

    <div class="max-w-4xl w-full space-y-4">
        <header class="flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-400">Remote Control Hub</h1>
            <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500"></div>
        </header>

        <!-- Conexão WebRTC -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="bg-slate-900 p-3 rounded-lg border border-slate-800">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Meu ID Local</p>
                <div id="my-id" class="text-lg font-mono text-blue-300">A iniciar...</div>
            </div>
            <div class="bg-slate-900 p-3 rounded-lg border border-slate-800 flex gap-2">
                <input type="text" id="remote-id" placeholder="ID do Streamer" class="bg-black border border-slate-700 rounded px-3 py-1 text-sm grow focus:border-blue-500 outline-none">
                <button id="connectBtn" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-sm font-bold transition">Conectar</button>
            </div>
        </div>

        <!-- Conexão WebSocket (Mouse) -->
        <div class="bg-slate-900 p-3 rounded-lg border border-slate-800 flex flex-wrap gap-3 items-center">
            <div class="grow">
                <input type="text" id="ws-ip" placeholder="IP do Computador (ex: 192.168.1.10)" class="w-full bg-black border border-slate-700 rounded px-3 py-2 text-sm outline-none focus:border-green-500">
            </div>
            <button id="wsConnectBtn" class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded text-sm font-bold transition">Ligar Mouse</button>
            <p id="ws-status" class="w-full text-center text-[10px] text-slate-500 italic">Servidor Python não detetado</p>
        </div>

        <!-- Área do Stream -->
        <div id="interactiveArea" class="video-container cursor-none">
            <video id="screenVideo" autoplay playsinline muted></video>
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 bg-slate-900">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                <p>Sem sinal de vídeo</p>
            </div>
        </div>

        <div class="flex gap-2">
            <button id="startBtn" class="grow bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold">Transmitir minha tela</button>
            <button id="fullscreenBtn" class="bg-slate-800 px-4 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const video = document.getElementById('screenVideo');
        const interactiveArea = document.getElementById('interactiveArea');
        const startBtn = document.getElementById('startBtn');
        const connectBtn = document.getElementById('connectBtn');
        const wsConnectBtn = document.getElementById('wsConnectBtn');
        const wsIpInput = document.getElementById('ws-ip');
        const wsStatus = document.getElementById('ws-status');
        const statusDot = document.getElementById('status-dot');

        let ws = null;

        // --- WebRTC (PeerJS) ---
        const peer = new Peer();
        peer.on('open', id => document.getElementById('my-id').innerText = id);
        
        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                video.srcObject = stream;
                document.getElementById('placeholder').classList.add('hidden');
                statusDot.classList.replace('bg-red-500', 'bg-green-500');
            });
        });

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                video.srcObject = stream;
                document.getElementById('placeholder').classList.add('hidden');
            } catch (err) {
                console.error("Erro ao capturar tela:", err);
            }
        };

        connectBtn.onclick = () => {
            const id = document.getElementById('remote-id').value;
            if (!id) return;
            // Se estivermos a transmitir, enviamos o stream. Se não, apenas ligamos.
            if (video.srcObject) peer.call(id, video.srcObject);
            else console.log("Apenas conectando ao peer...");
        };

        // --- WebSocket (Controlo Mouse) ---
        wsConnectBtn.onclick = () => {
            const ip = wsIpInput.value;
            if (!ip) return;
            
            if (ws) ws.close();
            
            ws = new WebSocket(`ws://${ip}:9000`);
            
            ws.onopen = () => {
                wsStatus.innerText = "Mouse Conectado ao PC!";
                wsStatus.className = "w-full text-center text-[10px] text-green-400 font-bold";
                wsConnectBtn.classList.replace('bg-slate-700', 'bg-green-600');
                wsConnectBtn.innerText = "Ligado";
            };
            
            ws.onclose = () => {
                wsStatus.innerText = "Conexão perdida";
                wsStatus.className = "w-full text-center text-[10px] text-red-400";
                wsConnectBtn.classList.replace('bg-green-600', 'bg-slate-700');
                wsConnectBtn.innerText = "Reconectar";
            };
        };

        // Captura de Clique/Toque
        interactiveArea.addEventListener('pointerdown', (e) => {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            const rect = interactiveArea.getBoundingClientRect();
            
            // Cálculo em percentagem (0-100)
            const xPercent = ((e.clientX - rect.left) / rect.width) * 100;
            const yPercent = ((e.clientY - rect.top) / rect.height) * 100;

            // Feedback visual
            const ripple = document.createElement('div');
            ripple.className = 'click-ripple';
            ripple.style.left = `${e.clientX - rect.left}px`;
            ripple.style.top = `${e.clientY - rect.top}px`;
            interactiveArea.appendChild(ripple);
            setTimeout(() => ripple.remove(), 400);

            // Envio para o Python
            ws.send(JSON.stringify({
                type: 'click',
                x: xPercent.toFixed(2),
                y: yPercent.toFixed(2)
            }));
        });

        document.getElementById('fullscreenBtn').onclick = () => {
            if (!document.fullscreenElement) interactiveArea.requestFullscreen();
            else document.exitFullscreen();
        };
    </script>
</body>
</html>
